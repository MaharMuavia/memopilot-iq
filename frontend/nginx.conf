# Serves the built SPA and proxies API calls to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every route returns index.html (React Router handles it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health to the backend service (see docker-compose.yml).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
